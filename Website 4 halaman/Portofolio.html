            ul {

                margin: 0;
                padding: 10px 30px;
                border: 2px solid #385536;
                border-radius: 80px;
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 60px;
                position: absolute;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                width: 95%;
                max-width: 1500px;
                max-height: 70px;

            }

           
.video-scroll-section {
    width: 100%; 
    height: 200vh;
    position: relative;
    view-timeline: --section-progress block;
}

.video-wrapper {
    width: 100%; 
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.video-wrapper video {
    width: 70%;
    border-radius: 20px;
    animation: expand-video linear both;
    animation-timeline: --section-progress;
    animation-range: cover 33.33% cover 66.67%;
}

@keyframes expand-video {
    from {
        width: 70%;
        border-radius: 20px;
    }
    to {
        width: 100%;
        border-radius: 0px;
    }
}
